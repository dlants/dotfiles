# Minimal prompt inspired by pure
# https://github.com/sindresorhus/pure

format = """
$hostname\
$directory\
${custom.git_status}\
$git_state\
$cmd_duration\
$line_break\
$character"""

[hostname]
ssh_only = true
style = "bold red"
format = "[dev]($style) "

[directory]
style = "blue"
truncation_length = 0
truncate_to_repo = false

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"

[custom.git_status]
description = "Git branch + status"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
command = '''
root=$(git rev-parse --show-toplevel 2>/dev/null)
cache_file="$HOME/.cache/starship-git-status/${root//\//%}"
cat "$cache_file" 2>/dev/null
'''
format = "[$output]($style) "
style = "bright-black"
shell = ["bash"]

[git_branch]
disabled = true

[git_status]
disabled = true

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"
min_time = 5_000

